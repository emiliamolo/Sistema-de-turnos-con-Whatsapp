<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Profesional - Turnos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Mulish:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            900: '#064e3b',
                        }
                    },
                    fontFamily: {
                        sans: ['Mulish', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Mulish', 'sans-serif'; }
        .glass {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body class="bg-[#f1f5f9] min-h-screen flex items-center justify-center p-6 relative overflow-hidden">
    <div class="absolute -top-24 -left-24 w-96 h-96 bg-primary-900/10 rounded-full blur-3xl"></div>
    <div class="absolute -bottom-24 -right-24 w-96 h-96 bg-emerald-900/10 rounded-full blur-3xl"></div>

    <div class="w-full max-w-md relative z-10">
        <div class="text-center mb-10">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-primary-900 rounded-2xl shadow-xl shadow-primary-900/20 mb-4">
                <span class="text-white text-3xl font-black">GF</span>
            </div>
            <h1 class="text-4xl font-black text-primary-900 tracking-tight">Turnos</h1>
            <p class="text-slate-500 font-semibold mt-2 text-lg">Portal Profesional</p>
        </div>

        <div class="glass p-10 rounded-[2.5rem] shadow-2xl">
            {% if error %}
            <div class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-2xl mb-6 text-sm font-medium">
                {{ error }}
            </div>
            {% endif %}

            <form action="/professional/login" method="POST" class="space-y-6">
                <div>
                    <label class="block text-sm font-extrabold text-primary-900 mb-2 ml-1 uppercase tracking-wider">Email</label>
                    <input type="email" name="email" required
                        class="w-full px-5 py-4 bg-white/50 border border-slate-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-primary-900 focus:border-transparent transition-all font-medium text-slate-800 placeholder-slate-400"
                        placeholder="tu@email.com">
                </div>
                <div>
                    <label class="block text-sm font-extrabold text-primary-900 mb-2 ml-1 uppercase tracking-wider">Contraseña</label>
                    <input type="password" name="password" required
                        class="w-full px-5 py-4 bg-white/50 border border-slate-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-primary-900 focus:border-transparent transition-all font-medium text-slate-800 placeholder-slate-400"
                        placeholder="••••••••">
                </div>
                <button type="submit"
                    class="w-full py-4 bg-primary-900 text-white rounded-2xl font-black text-lg hover:bg-emerald-900 hover:shadow-xl hover:shadow-primary-900/30 transform hover:-translate-y-1 transition-all active:scale-95 shadow-lg shadow-primary-900/10">
                    Ingresar al Portal
                </button>
            </form>

            <div class="mt-8 text-center">
                <a href="/auth/login" class="text-primary-900 font-bold hover:underline text-sm opacity-70">Acceso Administradores</a>
            </div>
        </div>

        <p class="text-center mt-8 text-slate-400 text-sm font-bold">
            &copy; 2024 Turnos. Todos los derechos reservados.
        </p>
    </div>
</body>
</html>
