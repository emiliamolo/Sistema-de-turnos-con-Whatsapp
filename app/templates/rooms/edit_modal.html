<div id="room-edit-modal" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm flex items-center justify-center z-50">
    <div class="bg-white rounded-2xl p-8 w-full max-w-md shadow-2xl">
        <h3 class="text-xl font-bold mb-6">Editar Sala</h3>
        <form hx-post="/admin/rooms/{{ room.id }}" hx-target="#rooms-table-body" hx-on::after-request="document.getElementById('room-edit-modal').remove()">
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Nombre de la Sala</label>
                    <input type="text" name="name" value="{{ room.name }}" required class="w-full px-4 py-2 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Descripción</label>
                    <textarea name="description" class="w-full px-4 py-2 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none">{{ room.description }}</textarea>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Capacidad</label>
                    <input type="number" name="capacity" value="{{ room.capacity }}" class="w-full px-4 py-2 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>
            </div>
            <div class="mt-8 flex space-x-3">
                <button type="button" onclick="document.getElementById('room-edit-modal').remove()" class="flex-1 px-4 py-2 border border-slate-200 rounded-xl font-medium hover:bg-slate-50">Cancelar</button>
                <button type="submit" class="flex-1 px-4 py-2 bg-indigo-600 text-white rounded-xl font-medium hover:bg-indigo-700">Guardar Cambios</button>
            </div>
        </form>
    </div>
</div>
