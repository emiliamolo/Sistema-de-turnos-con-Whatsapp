<div id="booking-edit-modal" class="fixed inset-0 bg-primary-900/40 backdrop-blur-sm flex items-start justify-center z-[70] p-4 overflow-y-auto">
    <div class="bg-white rounded-[2rem] p-8 w-full max-w-md shadow-2xl transform transition-all my-8 max-h-none">
        <div class="flex items-center justify-between mb-6">
            <h3 class="text-2xl font-black text-primary-900">Editar Turno</h3>
            <button onclick="document.getElementById('booking-edit-modal').remove()" class="text-slate-400 hover:text-slate-600">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
        </div>
        <form hx-post="/admin/bookings/{{ booking.id }}" hx-target="#bookings-table-body" hx-on::after-request="
            var errDiv = document.querySelector('#booking-edit-modal .booking-error');
            if (event.detail.successful) {
                document.getElementById('booking-edit-modal').remove();
            } else {
                try {
                    var err = JSON.parse(event.detail.xhr.responseText);
                    errDiv.textContent = err.detail || 'Error al editar el turno';
                } catch(e) {
                    errDiv.textContent = 'Error al editar el turno';
                }
                errDiv.classList.remove('hidden');
            }
        "
              data-old-start="{{ booking.start_time.strftime('%Y-%m-%dT%H:%M') }}"
              data-old-end="{{ booking.end_time.strftime('%Y-%m-%dT%H:%M') }}"
              data-booking-id="{{ booking.id }}">
            <div class="space-y-5">
                <div>
                    <label class="block text-xs font-black text-primary-900 uppercase tracking-widest mb-2 ml-1">Cliente</label>
                    <select name="customer_id" required class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-primary-900 outline-none font-medium">
                        {% for customer in customers %}
                        <option value="{{ customer.id }}" {% if customer.id == booking.customer_id %}selected{% endif %}>{{ customer.full_name }} ({{ customer.phone_number }})</option>
                        {% endfor %}
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-black text-primary-900 uppercase tracking-widest mb-2 ml-1">Servicio</label>
                    <select name="service_id" required onchange="filterRooms(this.value, this.closest('form')); fetchSlots(this.closest('form'))" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-primary-900 outline-none font-medium">
                        {% for service in services %}
                        <option value="{{ service.id }}" {% if service.id == booking.service_id %}selected{% endif %}>{{ service.name }} - ${{ service.price }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-black text-primary-900 uppercase tracking-widest mb-2 ml-1">Sala</label>
                    <select name="room_id" required onchange="fetchSlots(this.closest('form'))" class="booking-room-select w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-primary-900 outline-none font-medium">
                        {% for room in rooms %}
                        <option value="{{ room.id }}" {% if room.id == booking.room_id %}selected{% endif %}>{{ room.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-black text-primary-900 uppercase tracking-widest mb-2 ml-1">Profesional (Opcional)</label>
                    <select name="staff_id" onchange="fetchSlots(this.closest('form'))" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-primary-900 outline-none font-medium">
                        <option value="">Sin asignar</option>
                        {% for member in staff %}
                        <option value="{{ member.id }}" {% if booking.staff_id and member.id == booking.staff_id %}selected{% endif %}>{{ member.name }} ({{ member.specialty or 'General' }})</option>
                        {% endfor %}
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-black text-primary-900 uppercase tracking-widest mb-2 ml-1">Fecha</label>
                    <input type="date" name="booking_date" onchange="fetchSlots(this.closest('form'))" class="booking-date-input w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-primary-900 outline-none font-medium" value="{{ booking.start_time.strftime('%Y-%m-%d') }}">
                </div>
                <div>
                    <label class="block text-xs font-black text-primary-900 uppercase tracking-widest mb-2 ml-1">Horario</label>
                    <div class="booking-slots-container grid grid-cols-3 gap-2 min-h-[60px]">
                        <p class="col-span-3 text-sm text-slate-400 italic py-3 text-center">Cargando horarios...</p>
                    </div>
                    <input type="hidden" name="start_time" class="booking-datetime-hidden" value="{{ booking.start_time.strftime('%Y-%m-%dT%H:%M') }}">
                </div>
                <div>
                    <label class="block text-xs font-black text-primary-900 uppercase tracking-widest mb-2 ml-1">Estado</label>
                    <select name="status" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-primary-900 outline-none font-medium">
                        <option value="confirmed" {% if booking.status == 'confirmed' %}selected{% endif %}>Confirmado</option>
                        <option value="pending" {% if booking.status == 'pending' %}selected{% endif %}>Pendiente</option>
                        <option value="cancelled" {% if booking.status == 'cancelled' %}selected{% endif %}>Cancelado</option>
                        <option value="completed" {% if booking.status == 'completed' %}selected{% endif %}>Completado</option>
                        <option value="no-show" {% if booking.status == 'no-show' %}selected{% endif %}>No asistió</option>
                    </select>
                </div>
                <div>
                    <label class="flex items-center cursor-pointer">
                        <input type="checkbox" name="notify_client" checked class="w-5 h-5 text-primary-900 rounded focus:ring-primary-900 border-slate-300">
                        <span class="ml-2 text-sm font-medium text-slate-700">¿Avisar al cliente del cambio?</span>
                    </label>
                </div>
            </div>
            <div class="booking-error hidden mt-4 p-3 bg-red-50 border border-red-200 rounded-xl text-sm text-red-600 font-medium"></div>
            <div class="mt-8 flex space-x-3">
                <button type="button" onclick="document.getElementById('booking-edit-modal').remove()" class="flex-1 px-4 py-4 border border-slate-200 rounded-2xl font-bold text-slate-500 hover:bg-slate-50 transition-all">Cancelar</button>
                <button type="submit" class="flex-1 px-4 py-4 bg-primary-900 text-white rounded-2xl font-bold hover:bg-primary-800 shadow-lg shadow-primary-900/20 transition-all">Guardar Cambios</button>
            </div>
        </form>
    </div>
</div>

<script>
var serviceRoomsMap = {
    {% for service in services %}
    "{{ service.id }}": [{% for room in service.rooms %}"{{ room.id }}"{% if not loop.last %},{% endif %}{% endfor %}],
    {% endfor %}
};

function filterRooms(serviceId, form) {
    var sel = form.querySelector('.booking-room-select');
    if (!sel) return;
    var allowed = serviceRoomsMap[serviceId] || [];
    var options = sel.querySelectorAll('option');
    var found = false;
    options.forEach(function(opt) {
        if (allowed.length === 0 || allowed.indexOf(opt.value) >= 0) {
            opt.style.display = '';
            if (!found) { sel.value = opt.value; found = true; }
        } else {
            opt.style.display = 'none';
        }
    });
    if (!found) { sel.selectedIndex = -1; }
}

function fetchSlots(form) {
    var serviceId = form.querySelector('select[name="service_id"]').value;
    var roomId = form.querySelector('select[name="room_id"]').value;
    var staffId = form.querySelector('select[name="staff_id"]').value;
    var dateVal = form.querySelector('input[name="booking_date"]').value;
    var container = form.querySelector('.booking-slots-container');
    var hidden = form.querySelector('.booking-datetime-hidden');
    var currentIso = hidden.value;

    if (!serviceId || !roomId || !dateVal) {
        container.innerHTML = '<p class="col-span-3 text-sm text-slate-400 italic py-3 text-center">Seleccioná servicio, sala y fecha para ver horarios.</p>';
        hidden.value = '';
        return;
    }

    container.innerHTML = '<p class="col-span-3 text-sm text-slate-400 italic py-3 text-center">Cargando horarios...</p>';
    var url = '/admin/available-slots?date=' + dateVal + '&service_id=' + serviceId + '&room_id=' + roomId;
    if (staffId) url += '&staff_id=' + staffId;

    fetch(url)
        .then(function(r) { return r.json(); })
        .then(function(slots) {
            if (!slots || slots.length === 0) {
                container.innerHTML = '<p class="col-span-3 text-sm text-red-400 italic py-3 text-center">No hay horarios disponibles para esta fecha.</p>';
                hidden.value = '';
                return;
            }
            hidden.value = '';
            var html = '';
            slots.forEach(function(s) {
                var selected = s.iso === currentIso ? ' bg-primary-900 text-white' : ' bg-slate-100 text-slate-700';
                html += '<button type="button" class="slot-btn px-3 py-2 hover:bg-primary-900 hover:text-white font-bold rounded-xl text-sm transition-all' + selected + '" data-iso="' + s.iso + '" onclick="selectSlot(this)">' + s.time + '</button>';
            });
            container.innerHTML = html;
            if (!currentIso) { hidden.value = ''; }
        })
        .catch(function() {
            container.innerHTML = '<p class="col-span-3 text-sm text-red-400 italic py-3 text-center">Error al cargar horarios.</p>';
        });
}

function selectSlot(btn) {
    var form = btn.closest('form');
    var hidden = form.querySelector('.booking-datetime-hidden');
    hidden.value = btn.getAttribute('data-iso');
    form.querySelectorAll('.slot-btn').forEach(function(b) { b.classList.remove('bg-primary-900', 'text-white'); b.classList.add('bg-slate-100', 'text-slate-700'); });
    btn.classList.remove('bg-slate-100', 'text-slate-700');
    btn.classList.add('bg-primary-900', 'text-white');
}

(function() {
    var form = document.querySelector('#booking-edit-modal form');
    if (form) {
        var serviceSel = form.querySelector('select[name="service_id"]');
        if (serviceSel && serviceSel.value) {
            filterRooms(serviceSel.value, form);
            fetchSlots(form);
        }
    }
})();
</script>
