<header class="bg-white border-b border-slate-200 px-8 py-4 hidden md:flex items-center justify-between">
    <h1 class="text-xl font-bold text-slate-800">Vista General</h1>
</header>

<section class="p-4 md:p-8">
    <!-- Stats Grid -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
            <div class="flex items-center justify-between mb-4">
                <div class="p-3 bg-primary-50 rounded-xl text-primary-600">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                </div>
                <span class="text-xs font-bold text-emerald-500 bg-emerald-50 px-2 py-1 rounded-lg">+12%</span>
            </div>
            <h3 class="text-slate-500 text-sm font-medium">Turnos Hoy</h3>
            <p class="text-2xl font-bold text-slate-800 mt-1">{{ bookings|length }}</p>
        </div>
        
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
            <div class="flex items-center justify-between mb-4">
                <div class="p-3 bg-primary-50 rounded-xl text-primary-600">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                </div>
                <span class="text-xs font-bold text-emerald-500 bg-emerald-50 px-2 py-1 rounded-lg">Al día</span>
            </div>
            <h3 class="text-slate-500 text-sm font-medium">Servicios Activos</h3>
            <p class="text-2xl font-bold text-slate-800 mt-1">{{ services_count }}</p>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
            <div class="flex items-center justify-between mb-4">
                <div class="p-3 bg-emerald-50 rounded-xl text-emerald-600">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                </div>
                <span class="text-xs font-bold text-emerald-500 bg-emerald-50 px-2 py-1 rounded-lg">Mes</span>
            </div>
            <h3 class="text-slate-500 text-sm font-medium">Reservas Totales</h3>
            <p class="text-2xl font-bold text-slate-800 mt-1">{{ bookings_count }}</p>
        </div>
    </div>

    <!-- Recent Appointments Table -->
    <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
        <div class="px-6 py-4 border-b border-slate-100 flex justify-between items-center">
            <h4 class="font-bold text-slate-800">Próximos Turnos</h4>
            <button hx-get="/admin/calendar?view=day" hx-target="#main-view-content" hx-push-url="true" hx-swap="innerHTML" class="text-sm font-bold text-primary-900 hover:text-primary-700">Ver todos</button>
        </div>
        <div class="overflow-x-auto">
            <table class="w-full text-left">
                <thead class="bg-slate-50 border-b border-slate-100">
                    <tr class="text-slate-500 text-xs font-bold uppercase tracking-wider">
                        <th class="px-6 py-3">Cliente</th>
                        <th class="px-6 py-3">Servicio</th>
                        <th class="px-6 py-3">Fecha / Hora</th>
                        <th class="px-6 py-3">Estado</th>
                        <th class="px-6 py-3 text-right">Acciones</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-slate-100" id="bookings-table-body">
                    {% include "bookings/table_rows.html" %}
                </tbody>
            </table>
        </div>
    </div>
</section>

{% include "payments/modal.html" %}
