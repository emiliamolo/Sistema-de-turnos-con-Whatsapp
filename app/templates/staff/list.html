<header class="bg-white border-b border-slate-200 px-8 py-4 flex items-center justify-between">
    <h1 class="text-xl font-extrabold text-slate-800">Staff / Profesionales</h1>
    <button onclick="document.getElementById('staff-modal').classList.remove('hidden')" 
            class="bg-primary-900 text-white px-6 py-2.5 rounded-xl font-bold hover:bg-primary-800 transition-all shadow-lg shadow-primary-900/20">
        Nuevo Profesional
    </button>
</header>

<section class="p-4 md:p-8">
    <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
        <div class="overflow-x-auto">
            <table class="w-full text-left">
                <thead class="bg-slate-50 border-b border-slate-100">
                    <tr class="text-slate-500 text-xs font-bold uppercase tracking-wider">
                        <th class="px-6 py-4">Nombre</th>
                        <th class="px-6 py-4">Especialidad</th>
                        <th class="px-6 py-4">Portal</th>
                        <th class="px-6 py-4">Estado</th>
                        <th class="px-6 py-4 text-right">Acciones</th>
                    </tr>
                </thead>
                <tbody id="staff-table-body" class="divide-y divide-slate-100">
                    {% include "staff/table_rows.html" %}
                </tbody>
            </table>
        </div>
    </div>
</section>

<!-- Modal para nuevo staff -->
<div id="staff-modal" class="hidden fixed inset-0 bg-primary-900/40 backdrop-blur-sm flex items-center justify-center z-[60] p-4">
    <div class="bg-white rounded-[2rem] p-8 w-full max-w-md shadow-2xl transform transition-all">
        <div class="flex items-center justify-between mb-6">
            <h3 class="text-2xl font-black text-primary-900">Nuevo Profesional</h3>
            <button onclick="document.getElementById('staff-modal').classList.add('hidden')" class="text-slate-400 hover:text-slate-600">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
        </div>
        <form hx-post="/admin/staff" hx-target="#staff-table-body" hx-on::after-request="document.getElementById('staff-modal').classList.add('hidden'); this.reset();">
            <div class="space-y-5">
                <div>
                    <label class="block text-xs font-black text-primary-900 uppercase tracking-widest mb-2 ml-1">Nombre Completo</label>
                    <input type="text" name="name" required class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-primary-900 outline-none font-medium">
                </div>
                <div>
                    <label class="block text-xs font-black text-primary-900 uppercase tracking-widest mb-2 ml-1">Especialidad</label>
                    <input type="text" name="specialty" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-primary-900 outline-none font-medium">
                </div>
                <div class="border-t border-slate-100 pt-4">
                    <p class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-3">Acceso al Portal Profesional (opcional)</p>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-xs font-black text-primary-900 uppercase tracking-widest mb-2 ml-1">Email</label>
                            <input type="email" name="email" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-primary-900 outline-none font-medium" placeholder="profesional@email.com">
                        </div>
                        <div>
                            <label class="block text-xs font-black text-primary-900 uppercase tracking-widest mb-2 ml-1">Contraseña</label>
                            <input type="password" name="password" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-primary-900 outline-none font-medium" placeholder="••••••••">
                        </div>
                    </div>
                </div>
            </div>
            <div class="mt-8 flex space-x-3">
                <button type="button" onclick="document.getElementById('staff-modal').classList.add('hidden')" class="flex-1 px-4 py-4 border border-slate-200 rounded-2xl font-bold text-slate-500 hover:bg-slate-50 transition-all">Cancelar</button>
                <button type="submit" class="flex-1 px-4 py-4 bg-primary-900 text-white rounded-2xl font-bold hover:bg-primary-800 shadow-lg shadow-primary-900/20 transition-all">Guardar</button>
            </div>
        </form>
    </div>
</div>

<div id="edit-modal-container"></div>
