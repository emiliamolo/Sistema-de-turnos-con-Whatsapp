<header class="bg-white border-b border-slate-200 px-8 py-4 flex items-center justify-between">
    <div>
        <h1 class="text-xl font-extrabold text-slate-800">Pagos</h1>
    </div>
</header>

<section class="p-4 md:p-8">
    <!-- Summary Cards -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
        <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 flex items-center justify-between">
            <div>
                <p class="text-xs font-bold text-slate-500 uppercase tracking-wider">Total Cobrado</p>
                <h3 class="text-2xl font-black text-emerald-600">${{ "{:,.2f}".format(total_collected) }}</h3>
            </div>
            <div class="w-12 h-12 bg-emerald-50 rounded-xl flex items-center justify-center text-emerald-600">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            </div>
        </div>
        <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 flex items-center justify-between">
            <div>
                <p class="text-xs font-bold text-slate-500 uppercase tracking-wider">Pendiente de cobro</p>
                <h3 class="text-2xl font-black text-amber-600">${{ "{:,.2f}".format(total_pending) }}</h3>
                <p class="text-xs text-slate-400 mt-1">{{ unpaid_count }} turnos sin cobrar</p>
            </div>
            <div class="w-12 h-12 bg-amber-50 rounded-xl flex items-center justify-center text-amber-600">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            </div>
        </div>
    </div>

    <!-- Filters -->
    <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-4 mb-6">
        <form hx-get="/admin/payments" hx-target="#payments-table-body" hx-trigger="change" class="flex flex-wrap gap-4">
            <div class="flex-1 min-w-[180px]">
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Cliente</label>
                <select name="customer_id" class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-primary-900 outline-none text-sm font-medium">
                    <option value="">Todos</option>
                    {% for customer in customers %}
                    <option value="{{ customer.id }}" {% if filters.customer_id == customer.id %}selected{% endif %}>{{ customer.full_name or customer.phone_number }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="flex-1 min-w-[150px]">
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Estado</label>
                <select name="status" class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-primary-900 outline-none text-sm font-medium">
                    <option value="">Todos</option>
                    <option value="paid" {% if filters.status == 'paid' %}selected{% endif %}>Pagado</option>
                    <option value="pending" {% if filters.status == 'pending' %}selected{% endif %}>Pendiente</option>
                    <option value="partial" {% if filters.status == 'partial' %}selected{% endif %}>Parcial</option>
                </select>
            </div>
            <div class="flex-1 min-w-[150px]">
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Desde</label>
                <input type="date" name="date_from" value="{{ filters.date_from }}" class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-primary-900 outline-none text-sm font-medium">
            </div>
            <div class="flex-1 min-w-[150px]">
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Hasta</label>
                <input type="date" name="date_to" value="{{ filters.date_to }}" class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-primary-900 outline-none text-sm font-medium">
            </div>
            <div class="flex items-end">
                <a href="/admin/payments" class="px-4 py-2 bg-slate-100 text-slate-600 rounded-xl font-bold hover:bg-slate-200 transition-all text-sm h-[38px] flex items-center">Limpiar</a>
            </div>
        </form>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
        <div class="overflow-x-auto">
            <table class="w-full text-left">
                <thead class="bg-slate-50 border-b border-slate-100">
                    <tr class="text-slate-500 text-xs font-bold uppercase tracking-wider">
                        <th class="px-6 py-4">Cliente</th>
                        <th class="px-6 py-4">Turno</th>
                        <th class="px-6 py-4">Monto</th>
                        <th class="px-6 py-4">Método</th>
                        <th class="px-6 py-4">Estado</th>
                        <th class="px-6 py-4">Fecha</th>
                        <th class="px-6 py-4 text-right">Acciones</th>
                    </tr>
                </thead>
                <tbody id="payments-table-body" class="divide-y divide-slate-100">
                    {% include "payments/table_rows.html" %}
                </tbody>
            </table>
        </div>
    </div>
</section>
