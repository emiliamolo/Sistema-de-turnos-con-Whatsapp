<div id="service-edit-modal" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm flex items-center justify-center z-50">
    <div class="bg-white rounded-2xl p-8 w-full max-w-md shadow-2xl">
        <h3 class="text-xl font-bold mb-6">Editar Servicio</h3>
        <form hx-post="/admin/services/{{ service.id }}" hx-target="#services-table-body" hx-on::after-request="document.getElementById('service-edit-modal').remove()">
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Nombre del Servicio</label>
                    <input type="text" name="name" value="{{ service.name }}" required class="w-full px-4 py-2 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Descripción</label>
                    <textarea name="description" class="w-full px-4 py-2 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none">{{ service.description }}</textarea>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Duración (minutos)</label>
                    <input type="number" name="duration" value="{{ service.duration_minutes }}" class="w-full px-4 py-2 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Precio</label>
                    <input type="number" step="0.01" name="price" value="{{ service.price }}" class="w-full px-4 py-2 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Tipo de Comisión</label>
                    <select name="commission_type" class="w-full px-4 py-2 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none">
                        <option value="">Sin comisión</option>
                        <option value="percentage" {% if service.commission_type == 'percentage' %}selected{% endif %}>Porcentaje (%)</option>
                        <option value="fixed" {% if service.commission_type == 'fixed' %}selected{% endif %}>Monto fijo ($)</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Valor de Comisión</label>
                    <input type="number" step="0.01" name="commission_value" value="{{ service.commission_value or '' }}" class="w-full px-4 py-2 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="Ej: 20 o 500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Salas</label>
                    <div class="max-h-40 overflow-y-auto space-y-1.5 border border-slate-200 rounded-xl p-3">
                        {% for room in rooms %}
                        <label class="flex items-center gap-2 cursor-pointer hover:bg-slate-50 rounded p-1">
                            <input type="checkbox" name="room_ids" value="{{ room.id }}"
                                   {% if room.id|string in assigned_room_ids %}checked{% endif %}
                                   class="w-4 h-4 text-indigo-600 rounded focus:ring-indigo-500 border-slate-300">
                            <span class="text-sm text-slate-700">{{ room.name }}</span>
                        </label>
                        {% else %}
                        <p class="text-sm text-slate-400 italic">No hay salas disponibles.</p>
                        {% endfor %}
                    </div>
                </div>
            </div>
            <div class="mt-8 flex space-x-3">
                <button type="button" onclick="document.getElementById('service-edit-modal').remove()" class="flex-1 px-4 py-2 border border-slate-200 rounded-xl font-medium hover:bg-slate-50">Cancelar</button>
                <button type="submit" class="flex-1 px-4 py-2 bg-indigo-600 text-white rounded-xl font-medium hover:bg-indigo-700">Guardar Cambios</button>
            </div>
        </form>
    </div>
</div>
