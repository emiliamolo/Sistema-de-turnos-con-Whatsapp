<header class="bg-white border-b border-slate-200 px-8 py-4 flex items-center justify-between">
    <h1 class="text-xl font-extrabold text-slate-800">Gestión de Servicios</h1>
    <button onclick="document.getElementById('service-modal').classList.remove('hidden')" 
            class="bg-primary-900 text-white px-6 py-2.5 rounded-xl font-bold hover:bg-primary-800 transition-all shadow-lg shadow-primary-900/20">
        Nuevo Servicio
    </button>
</header>

<section class="p-4 md:p-8">
    <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
        <div class="overflow-x-auto">
            <table class="w-full text-left">
                <thead class="bg-slate-50 border-b border-slate-100">
                    <tr class="text-slate-500 text-xs font-bold uppercase tracking-wider">
                    <th class="px-6 py-4">Servicio</th>
                    <th class="px-6 py-4">Duración</th>
                    <th class="px-6 py-4">Precio</th>
                    <th class="px-6 py-4">Comisión</th>
                    <th class="px-6 py-4">Salas</th>
                    <th class="px-6 py-4 text-right">Acciones</th>
                    </tr>
                </thead>
                <tbody id="services-table-body" class="divide-y divide-slate-100">
                    {% include "services/table_rows.html" %}
                </tbody>
            </table>
        </div>
    </div>
</section>

<!-- Modal para nuevo servicio -->
<div id="service-modal" class="hidden fixed inset-0 bg-primary-900/40 backdrop-blur-sm flex items-center justify-center z-[60] p-4">
    <div class="bg-white rounded-[2rem] p-8 w-full max-w-md shadow-2xl transform transition-all">
        <div class="flex items-center justify-between mb-6">
            <h3 class="text-2xl font-black text-primary-900">Nuevo Servicio</h3>
            <button onclick="document.getElementById('service-modal').classList.add('hidden')" class="text-slate-400 hover:text-slate-600">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
        </div>
        <form hx-post="/admin/services" hx-target="#services-table-body" hx-on::after-request="document.getElementById('service-modal').classList.add('hidden')">
            <div class="space-y-5">
                <div>
                    <label class="block text-xs font-black text-primary-900 uppercase tracking-widest mb-2 ml-1">Nombre del Servicio</label>
                    <input type="text" name="name" required class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-primary-900 outline-none font-medium" placeholder="Ej: Corte de pelo, Consulta...">
                </div>
                <div>
                    <label class="block text-xs font-black text-primary-900 uppercase tracking-widest mb-2 ml-1">Descripción</label>
                    <textarea name="description" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-primary-900 outline-none font-medium" placeholder="Opcional..."></textarea>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-black text-primary-900 uppercase tracking-widest mb-2 ml-1">Duración (min)</label>
                        <input type="number" name="duration" value="30" required class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-primary-900 outline-none font-medium">
                    </div>
                    <div>
                        <label class="block text-xs font-black text-primary-900 uppercase tracking-widest mb-2 ml-1">Precio ($)</label>
                        <input type="number" step="0.01" name="price" required class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-primary-900 outline-none font-medium">
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-black text-primary-900 uppercase tracking-widest mb-2 ml-1">Tipo de Comisión</label>
                    <select name="commission_type" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-primary-900 outline-none font-medium">
                        <option value="">Sin comisión</option>
                        <option value="percentage">Porcentaje (%)</option>
                        <option value="fixed">Monto fijo ($)</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-black text-primary-900 uppercase tracking-widest mb-2 ml-1">Valor de Comisión</label>
                    <input type="number" step="0.01" name="commission_value" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-primary-900 outline-none font-medium" placeholder="Ej: 20 o 500">
                </div>
                <div>
                    <label class="block text-xs font-black text-primary-900 uppercase tracking-widest mb-2 ml-1">Salas</label>
                    <div class="max-h-32 overflow-y-auto space-y-2 bg-slate-50 border border-slate-200 rounded-2xl p-3">
                        {% for room in rooms %}
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="checkbox" name="room_ids" value="{{ room.id }}" class="w-4 h-4 text-primary-900 rounded focus:ring-primary-900 border-slate-300">
                            <span class="text-sm font-medium text-slate-700">{{ room.name }}</span>
                        </label>
                        {% else %}
                        <p class="text-sm text-slate-400 italic">No hay salas creadas. Creá una sala primero.</p>
                        {% endfor %}
                    </div>
                </div>
            </div>
            <div class="mt-8 flex space-x-3">
                <button type="button" onclick="document.getElementById('service-modal').classList.add('hidden')" class="flex-1 px-4 py-4 border border-slate-200 rounded-2xl font-bold text-slate-500 hover:bg-slate-50 transition-all">Cancelar</button>
                <button type="submit" class="flex-1 px-4 py-4 bg-primary-900 text-white rounded-2xl font-bold hover:bg-primary-800 shadow-lg shadow-primary-900/20 transition-all">Crear Servicio</button>
            </div>
        </form>
    </div>
</div>
